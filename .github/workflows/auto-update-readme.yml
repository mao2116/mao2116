name: 🔄 Auto Update README

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: 📊 Update README Stats
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔄 Run README Updater
        run: python update_readme.py

      - name: 🚀 Commit README Changes
        run: |
          git config --global user.name "mao2116[bot]"
          git config --global user.email "mao2116[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No README changes found."
          else
            git commit -m "🔄 Auto update README $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

  generate-snake:
    name: 🐍 Generate Snake Animation
    runs-on: ubuntu-latest

    steps:
      - name: 🐍 Generate Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: mao2116
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: 🚀 Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
