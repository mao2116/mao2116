name: 🔄 Auto Update README

on:
schedule:
# Runs every 6 hours in UTC.
# Using minute 17 avoids the busy start-of-hour GitHub Actions queue.
- cron: "17 */6 * * *"

workflow_dispatch:

permissions:
contents: write

jobs:
update-readme:
runs-on: ubuntu-latest

```
steps:
  - name: 📥 Checkout repository
    uses: actions/checkout@v4

  - name: 🐍 Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: 🔄 Run README updater
    run: python update_readme.py

  - name: 🚀 Commit and push changes
    run: |
      git config --global user.name "mao2116[bot]"
      git config --global user.email "mao2116[bot]@users.noreply.github.com"

      git add README.md

      if git diff --cached --quiet; then
        echo "No README changes to commit."
      else
        git commit -m "🔄 Auto update README $(date -u '+%Y-%m-%d %H:%M UTC')"
        git push
      fi
```
