name: Auto Update README and Snake

on:
workflow_dispatch:
schedule:
- cron: "17,47 * * * *"

permissions:
contents: write

concurrency:
group: auto-update-readme
cancel-in-progress: true

jobs:
update-readme:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Check Required Files
    run: |
      echo "Current files:"
      ls -la

      if [ ! -f README.md ]; then
        echo "ERROR: README.md not found in repo root"
        exit 1
      fi

      if [ ! -f update_readme.py ]; then
        echo "ERROR: update_readme.py not found in repo root"
        exit 1
      fi

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.x"

  - name: Run README Update Script
    run: python3 update_readme.py
    env:
      GITHUB_TOKEN: ${{ github.token }}

  - name: Commit README Changes
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"

      git add README.md

      if git diff --cached --quiet; then
        echo "No README changes to commit"
      else
        git commit -m "Auto update README stats"
        git push
      fi
```

generate-snake:
runs-on: ubuntu-latest

```
steps:
  - name: Generate Snake SVG
    uses: Platane/snk/svg-only@v3
    with:
      github_user_name: mao2116
      outputs: |
        dist/github-contribution-grid-snake.svg
        dist/github-contribution-grid-snake-dark.svg?palette=github-dark
    env:
      GITHUB_TOKEN: ${{ github.token }}

  - name: Push Snake SVG To Output Branch
    uses: crazy-max/ghaction-github-pages@v4
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ github.token }}
```
